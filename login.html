<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Nex Cloud</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="auth-background">
    <div class="auth-layout">
        <!-- Ambient Background Glow -->
        <div class="ambient-glow"></div>

        <div class="auth-content">
            <div class="auth-form-container">
                <div class="logo-container">
                    <img src="assets/logoo.png" alt="NexCloud Logo" class="logo">
                </div>

                <div class="animate-slide-up">
                    <div style="text-align: center; margin-bottom: 2rem;">
                        <h1>تسجيل الدخول</h1>
                        <p class="description">أدخل بريدك الإلكتروني وكلمة المرور للوصول إلى حسابك</p>
                    </div>

                    <form id="loginForm">
                        <div class="form-group">
                            <label for="email">البريد الإلكتروني</label>
                            <input type="email" id="email" name="email" placeholder="name@example.com" dir="ltr">
                            <p id="emailError" class="error-message">يرجى إدخال بريد إلكتروني صحيح</p>
                        </div>

                        <div class="form-group">
                            <div class="flex-between">
                                <label for="password">كلمة المرور</label>
                                <a href="#" class="btn-link" style="font-size: 0.875rem;">نسيت كلمة المرور؟</a>
                            </div>
                            <input type="password" id="password" name="password" dir="ltr">
                            <p id="passwordError" class="error-message">كلمة المرور يجب أن تتكون من 6 أحرف على الأقل</p>
                        </div>

                        <div class="checkbox-group">
                            <input type="checkbox" id="rememberMe" name="rememberMe">
                            <label for="rememberMe" style="font-size: 0.875rem; font-weight: 500;">تذكرني</label>
                        </div>

                        <button type="submit" id="submitBtn" class="btn btn-primary">
                            <span class="loading-spinner" id="spinner"></span>
                            <span id="btnText">تسجيل الدخول</span>
                        </button>
                    </form>

                    <div class="footer-text">
                        ليس لديك حساب؟
                        <a href="register.html" class="btn-link" style="font-weight: 600;">حساب جديد</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="auth-hero">
            <div class="hero-image-container">
                <img src="assets/login-bg.avif" alt="Background Abstract" class="hero-image">
                <div class="hero-overlay"></div>
                <div class="hero-text">
                    <h2 style="font-size: 1.875rem; font-weight: 700;">نكس كلاود</h2>
                    <p style="margin-top: 1rem; font-size: 1.125rem;">
                        المنصة الأفضل لإدارة مشاريعك السحابية بكفاءة وأمان عالي.
                    </p>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
